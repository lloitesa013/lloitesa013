  <text class="txt muted small" x="150" y="438">SC: collision 0.000, latency 0.0757 ms, route 55.66 m</text>
  <rect class="gate" x="600" y="350" width="380" height="110"/>
  <text class="txt label" x="630" y="386">merge_cutin v11</text>
  <text class="txt muted small" x="630" y="414">Route-completion parity</text>
