  <text class="txt label" x="104" y="194">Perceive</text>
  <text class="txt muted small" x="86" y="220">state variables</text>
  <rect class="box" x="260" y="160" width="160" height="80"/>
  <text class="txt label" x="298" y="194">Propose</text>
  <text class="txt muted small" x="286" y="220">candidate action</text>
  <rect class="box" x="470" y="160" width="170" height="80"/>
  <text class="txt label" x="508" y="194">Arbitrate</text>
  <text class="txt muted small" x="502" y="220">value mediation</text>
  <rect class="gate" x="700" y="160" width="160" height="80"/>
  <text class="txt label" x="742" y="194">Gate</text>
  <text class="txt muted small" x="726" y="220">allow / restrain</text>
  <rect class="box" x="910" y="160" width="140" height="80"/>
  <text class="txt label" x="952" y="194">Explain</text>
  <text class="txt muted small" x="938" y="220">reason trace</text>
  <path class="arrow" d="M210 200 H260"/>
  <path class="arrow" d="M420 200 H470"/>
  <path class="arrow" d="M640 200 H700"/>
  <path class="arrow" d="M860 200 H910"/>
  <rect class="warn" x="120" y="350" width="380" height="110"/>
  <text class="txt label" x="150" y="386">ped_surprise v10</text>
