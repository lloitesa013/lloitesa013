<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="Angelos OS SynOptic Core pipeline">
  <defs>
    <style>
      .bg{fill:#f7f9fb}.box{fill:#fff;stroke:#cfd8df;stroke-width:2;rx:8}.gate{fill:#eef3f7;stroke:#176b87;stroke-width:2;rx:8}.warn{fill:#fff6e8;stroke:#a35b00;stroke-width:2;rx:8}.txt{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#172026}.muted{fill:#5f6b73}.title{font-size:30px;font-weight:700}.label{font-size:17px;font-weight:700}.small{font-size:13px}.arrow{stroke:#176b87;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#176b87"/>
    </marker>
  </defs>
  <rect class="bg" width="1100" height="560"/>
  <text class="txt title" x="60" y="58">Angelos OS / SynOptic Core</text>
  <text class="txt muted small" x="60" y="86">A top-level judgment layer between policy output and final action.</text>
