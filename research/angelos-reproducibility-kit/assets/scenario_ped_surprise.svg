<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="Pedestrian surprise sanitized scenario schematic">
  <defs>
    <style>
      .bg{fill:#f7f9fb}.road{fill:#e8edf1;stroke:#c9d2da;stroke-width:2}.cross{fill:#fff;stroke:#c9d2da;stroke-width:1}.ego{fill:#176b87}.ped{fill:#7c4d1d}.gate{fill:#fff;stroke:#176b87;stroke-width:2}.txt{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#172026}.muted{fill:#5f6b73}.title{font-size:28px;font-weight:700}.label{font-size:15px;font-weight:700}.small{font-size:13px}.arrow{stroke:#2f6f4e;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#2f6f4e"/>
    </marker>
  </defs>
  <rect class="bg" width="900" height="520"/>
  <text class="txt title" x="60" y="54">Pedestrian Surprise Frozen Anchor</text>
  <text class="txt muted small" x="60" y="82">Sanitized schematic for anchor v10, 40 matched seeds</text>
  <rect class="road" x="90" y="150" width="720" height="170" rx="18"/>
  <g>
    <rect class="cross" x="520" y="150" width="22" height="170"/>
    <rect class="cross" x="565" y="150" width="22" height="170"/>
    <rect class="cross" x="610" y="150" width="22" height="170"/>
  </g>
  <path class="arrow" d="M150 235 C275 235, 385 235, 505 235"/>
  <rect class="ego" x="285" y="210" width="90" height="48" rx="8"/>
  <text class="txt small" x="310" y="240" fill="#fff">Ego</text>
  <circle class="ped" cx="590" cy="206" r="18"/>
  <line class="ped" x1="590" y1="224" x2="590" y2="266" stroke="#7c4d1d" stroke-width="8"/>
  <line class="ped" x1="570" y1="248" x2="610" y2="248" stroke="#7c4d1d" stroke-width="7"/>
  <path class="arrow" d="M590 144 C590 160, 590 176, 590 190"/>
  <rect class="gate" x="650" y="180" width="130" height="92" rx="8"/>
  <text class="txt label" x="672" y="210">SC Gate</text>
  <text class="txt small" x="664" y="236">contact risk</text>
  <text class="txt small" x="664" y="256">mobility caveat</text>
  <line class="arrow" x1="375" y1="235" x2="646" y2="226"/>
  <rect class="gate" x="95" y="370" width="710" height="88" rx="8"/>
  <text class="txt label" x="120" y="400">Reading Rule</text>
  <text class="txt small" x="120" y="426">Pedestrian-priority behavior is read together with route distance, legality caveats, and mobility-freeze checks.</text>
  <text class="txt muted small" x="60" y="492">No raw CARLA frame, log path, or private workspace asset is included.</text>
</svg>
